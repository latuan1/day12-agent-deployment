services:
  - type: web
    name: travel-planning-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k gthread --threads 4 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: AGENT_API_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: travel-planning-redis
          property: connectionString
      - key: DEFAULT_PROVIDER
        value: mock

  - type: redis
    name: travel-planning-redis
    plan: free
    maxmemoryPolicy: allkeys-lru