version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    ports:
      - "6379:6379"

  agent:
    build:
      context: .
    environment:
      PORT: 8000
      REDIS_URL: redis://redis:6379/0
      AGENT_API_KEY: ${AGENT_API_KEY:-change-me}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-deepseek-ai/deepseek-v3.2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-10}
      MONTHLY_BUDGET_USD: ${MONTHLY_BUDGET_USD:-10}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-86400}
      ENVIRONMENT: production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    restart: unless-stopped
